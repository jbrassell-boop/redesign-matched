name: Deploy Server to Azure App Service

on:
  push:
    branches: [main]
    paths: [server/**]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Build and publish
        run: |
          dotnet restore server/TSI.sln
          dotnet build server/TSI.sln --no-restore --configuration Release
          dotnet publish server/TSI.Api/TSI.Api.csproj --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          publish-profile: ${{ secrets.AZURE_APP_SERVICE_PUBLISH_PROFILE }}
          package: ./publish
          clean: true
